<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>MamangFresh - Produk</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
      <div class="container">
        <a class="navbar-brand">MamangFresh</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="produk.html">Produk</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="portfolio.html">Portofolio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contact.html">Kontak</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="login.html">Login</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Poduct checkout.js yang menjalakan -->
    <div class="container mt-5">
      <h2 class="text-center mb-4">Produk Kami</h2>
      <div id="product-list" class="row g-3"></div>
    </div>

    <!-- Cart icon -->
    <div class="text-center mt-3 mb-5">
      🛒 Total Item: <span id="cart-count">0</span>
    </div>
    <div class="container mt-5">
      <h2 class="mb-4 text-center">Checkout</h2>

      <div class="row">
        <!-- Form Customer -->
        <div class="col-md-6">
          <div class="card p-4">
            <h5>Data Pengiriman</h5>

            <input
              type="text"
              id="nama"
              class="form-control mb-3"
              placeholder="Nama lengkap"
            />
            <textarea
              id="alamat"
              class="form-control mb-3"
              placeholder="Alamat lengkap"
            ></textarea>

            <select id="kota" class="form-select mb-3">
              <option value="">Pilih Kota</option>
              <option value="BogorKab">Bogor Kabupaten</option>
              <option value="BogorKot">Bogor Kota</option>
              <option value="Depok">Depok</option>
            </select>
          </div>
        </div>

        <!-- Bagian untuk detail belanja dan checkout -->
        <div class="col-md-6">
          <div class="card p-4">
            <h5>Ringkasan Belanja</h5>

            <p id="promo-info" class="text-danger small"></p>

            <ul id="cart-list" class="list-group mb-3"></ul>

            <div class="d-flex justify-content-between align-items-center">
              <span>Subtotal</span><span>Rp. <span id="subtotal">0</span></span>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <span>Ongkir</span><span>Rp. <span id="ongkir">0</span></span>
            </div>
            <h4
              class="d-flex justify-content-between align-items-center border-top pt-3 mt-3"
            >
              <span>Total</span
              ><span class="text-success fw-bold"
                >Rp. <span id="total">0</span></span
              >
            </h4>

            <button class="btn btn-success w-100 mt-3" onclick="checkoutWA()">
              Checkout via WhatsApp
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="checkout.js" defer></script>

        <!-- Footer -->
    <footer class="footer">
      <p>© 2026 MamangFresh</p>
    </footer>
  </body>
</html>
